service: shiftflow-backend-final

useDotenv: true

frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  stage: dev
  memorySize: 512
  timeout: 29
  httpApi:
    cors: true
  environment:
    MONGODB_URI: ${env:MONGODB_URI}
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN}
    BCRYPT_ROUNDS: ${env:BCRYPT_ROUNDS}
    REACT_APP_API_URL: ${env:REACT_APP_API_URL}

plugins:
  - serverless-offline

functions:
  api:
    handler: dist/handler.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  patterns:
    - '!src/**'
    - 'dist/**'
    - '!frontend/**'
    - '!node_modules/.cache/**'
    - '!.env'
    - '!README.md'
    - '!tsconfig.json'
    - '!server.ts'
    - '!app.ts'
    - '!handler.ts'
    